name: Daily AI News

on:
  schedule:
    - cron: '0 21 * * *'  # 毎朝6:00 JST (= 21:00 UTC)
  workflow_dispatch:       # 手動実行も可能

jobs:
  collect-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Collect news and send LINE notification
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python send_line.py

      - name: Commit and push news file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add news/
          git diff --staged --quiet || git commit -m "chore: add AI news for $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          git diff --staged --quiet || git push -u origin main
